# ~/.config/kitty/kitty.conf
# Kitty terminal configuration managed from ~/.config/dotfiles/kitty.

include themes/solarized-osaka.conf

font_size 15.0
font_family      family="Berkeley Mono"
bold_font        auto
italic_font      family='Berkeley Mono' style=Regular
bold_italic_font family='Berkeley Mono' style=Bold

disable_ligatures never

# Cursor and mouse behavior.
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
mouse_hide_wait 3.0

# Scrolling and window feel.
scrollback_lines 100000
wheel_scroll_multiplier 5.0
window_padding_width 12
remember_window_size yes
enabled_layouts splits,tall,fat,grid,stack
confirm_os_window_close 1

# macOS behavior.
macos_option_as_alt left
macos_quit_when_last_window_closed no
# Match the titlebar to the terminal background while keeping macOS traffic-light buttons.
macos_titlebar_color background

# Keep bells quiet but visible in the tab bar.
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab yes

# Tabs.
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

# Integrations.
shell_integration enabled
update_check_interval 24

# Split/window navigation, matching the Ghostty bindings in this repo.
map cmd+alt+h neighboring_window left
map cmd+alt+j neighboring_window down
map cmd+alt+k neighboring_window up
map cmd+alt+l neighboring_window right

map cmd+ctrl+h resize_window narrower 5
map cmd+ctrl+j resize_window shorter 5
map cmd+ctrl+k resize_window taller 5
map cmd+ctrl+l resize_window wider 5
map cmd+ctrl+0 resize_window reset

# Open new windows/tabs in the current working directory.
map cmd+enter launch --cwd=current
map cmd+t launch --type=tab --cwd=current
map cmd+n launch --type=os-window --cwd=current
