# ---------- Terminal / color ----------
# Use a 256-color terminal definition and advertise true color support.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------- Prefix / key behavior ----------
unbind C-b
bind-key -r C-a send-prefix
set -g prefix C-a
set -g repeat-time 0
set -g focus-events on

# ---------- General behavior ----------
set -g history-limit 10000
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g renumber-windows on
set -g pane-border-style "fg=#262626"
set -g pane-active-border-style "fg=#E7894C"
setw -g mode-keys vi

# ---------- Statusline ----------
# Revert to your original statusline/window style behavior.
set -g status-left-length 20
set -g status-justify centre
set -g status-style "fg=#F2ECDD,bg=#161616"
set -g window-status-style "fg=#627987,bg=#161616"
set -g window-status-current-style "fg=#161616,bg=#E7894C"
set -g window-status-activity-style "fg=#E3A25A,bg=#161616"
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
set -g window-status-separator ""

# ---------- Platform-specific config ----------
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

# ---------- Additional tmux config ----------
# Keep this last so local files can override defaults cleanly.
source ~/.config/tmux/statusline.conf
source ~/.config/tmux/theme.conf
source ~/.config/tmux/utility.conf
